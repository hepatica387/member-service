<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Service</title>
  <link rel="stylesheet" th:href="@{/css/app.css}" href="../static/css/app.css">
</head>
<body>
<div class="app-shell">
  <header class="top-bar">
    <a class="brand" th:href="@{/}" href="/">Member Service</a>
    <nav class="nav" aria-label="주요 메뉴">
      <a class="active" th:href="@{/}" href="/">홈</a>
      <a th:href="@{/members}" href="/members">회원 목록</a>
      <a th:href="@{/members/new}" href="/members/new">회원 등록</a>
    </nav>
  </header>

  <main class="main">
    <section class="hero" aria-labelledby="home-title">
      <div class="panel">
        <h1 id="home-title">회원 관리 서비스</h1>
        <p>Spring Boot MVC와 Thymeleaf로 회원 등록, 조회, 수정, 삭제 흐름을 확인하는 관리 화면입니다.</p>
        <div class="actions">
          <a class="btn primary" th:href="@{/members}" href="/members">회원 목록 보기</a>
          <a class="btn" th:href="@{/members/new}" href="/members/new">새 회원 등록</a>
        </div>
      </div>
      <aside class="metric" aria-label="회원 수">
        <strong th:text="${memberCount ?: 0}">0</strong>
        <span>등록된 회원</span>
      </aside>
    </section>
  </main>
</div>
</body>
</html>
