<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원 등록 | Member Service</title>
  <link rel="stylesheet" th:href="@{/css/app.css}" href="../../static/css/app.css">
</head>
<body>
<div class="app-shell">
  <header class="top-bar">
    <a class="brand" th:href="@{/}" href="/">Member Service</a>
    <nav class="nav" aria-label="주요 메뉴">
      <a th:href="@{/}" href="/">홈</a>
      <a th:href="@{/members}" href="/members">회원 목록</a>
      <a class="active" th:href="@{/members/new}" href="/members/new">회원 등록</a>
    </nav>
  </header>

  <main class="main">
    <div class="page-header">
      <div>
        <h1>회원 등록</h1>
        <p>새 회원의 기본 정보를 입력합니다.</p>
      </div>
    </div>

    <form class="form-panel" th:action="@{/members}" th:object="${member}" method="post">
      <div class="form-grid">
        <div class="field">
          <label for="name">이름</label>
          <input id="name" type="text" th:field="*{name}" name="name" required placeholder="홍길동">
        </div>
        <div class="field">
          <label for="email">이메일</label>
          <input id="email" type="email" th:field="*{email}" name="email" required placeholder="member@example.com">
        </div>
        <div class="field">
          <label for="phone">전화번호</label>
          <input id="phone" type="tel" th:field="*{phone}" name="phone" placeholder="010-1234-5678">
        </div>
        <div class="actions">
          <button class="btn primary" type="submit">등록</button>
          <a class="btn" th:href="@{/members}" href="/members">취소</a>
        </div>
      </div>
    </form>
  </main>
</div>
</body>
</html>
